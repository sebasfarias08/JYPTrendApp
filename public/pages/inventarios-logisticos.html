<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Inventario logistico</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 space-y-3 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <div class="flex items-center gap-2">
        <input id="q" class="input" placeholder="Buscar por nombre, codigo, descripcion o tipo" />
        <button id="btnNewLogistics" class="btn btn-primary whitespace-nowrap">Nuevo</button>
      </div>

      <div>
        <label class="text-xs text-muted block mb-1" for="logisticsTypeFilter">Tipo</label>
        <select id="logisticsTypeFilter" class="input">
          <option value="">Todos</option>
          <option value="warehouse">Depositos</option>
          <option value="point_of_sale">Puntos de venta</option>
        </select>
      </div>

      <label class="inline-flex items-center gap-2 text-sm text-muted">
        <input id="showInactive" type="checkbox" />
        Ver inactivos
      </label>

      <div id="logisticsCount" class="text-sm text-muted">0 registro(s)</div>
    </section>

    <section class="space-y-3">
      <div id="logisticsEmpty" class="card p-4 text-sm text-muted">
        No hay inventarios logisticos cargados todavia.
      </div>
      <div id="logisticsList" class="space-y-3"></div>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireRole } from "/js/auth.js";
    import { initAppShell } from "/js/app-shell.js";
    import { initLogisticsInventoriesPage } from "/js/logistics-inventories-page.js";

    const session = await requireRole(["admin"]);
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Inventario",
      onRefresh: async () => location.reload()
    });

    initLogisticsInventoriesPage();
  </script>
</body>
</html>
