<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Cuentas</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    .account-row { border-radius: 22px; border: 1px solid #e2e8f0; background: #ffffff; }
  </style>
</head>

<body class="h-screen overflow-hidden flex flex-col bg-slate-50">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto px-4 py-5 space-y-5 pb-[calc(env(safe-area-inset-bottom)+5rem)]">
    <section class="space-y-3">
      <div class="flex items-center justify-between gap-3">
        <div>
          <p class="text-sm text-slate-500">Finanzas</p>
          <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Cuentas</h1>
        </div>
        <a href="/pages/finance.html" class="text-sm font-semibold text-blue-600">Volver al panel</a>
      </div>
      <p class="text-sm text-slate-500">Lista de cuentas y saldos actuales.</p>
    </section>

    <section class="space-y-3">
      <div id="accountsList" class="space-y-3"></div>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireAuth } from "/js/app/auth/auth.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";
    import { getAccountBalances } from "/js/features/finance/accounts-service.js";
    import { showToast } from "/js/shared/ui/toast.js";

    const session = await requireAuth();
    if (!session) throw new Error("Redirect login");

    initAppShell({ title: "Cuentas" });

    const accountsList = document.getElementById("accountsList");

    function formatMoney(amount) {
      return new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS", maximumFractionDigits: 0 }).format(Number(amount ?? 0));
    }

    function renderAccount(account) {
      return `
        <article class="account-row p-4 shadow-sm">
          <div class="flex items-center justify-between gap-3">
            <div>
              <p class="text-sm font-semibold text-slate-900">${account.account_name}</p>
              <p class="mt-1 text-xs text-slate-500">${account.currency}</p>
            </div>
            <p class="text-lg font-semibold text-slate-900">${formatMoney(account.balance)}</p>
          </div>
          ${account.available_balance !== account.balance ? `<p class="mt-3 text-sm text-slate-500">Disponible: ${formatMoney(account.available_balance)}</p>` : ""}
        </article>
      `;
    }

    async function loadAccounts() {
      accountsList.innerHTML = "<p class='py-4 text-sm text-slate-500'>Cargando cuentas...</p>";
      const accounts = await getAccountBalances();
      if (!accounts.length) {
        accountsList.innerHTML = "<p class='py-4 text-sm text-slate-500'>No se encuentran cuentas registradas.</p>";
        return;
      }
      accountsList.innerHTML = accounts.map(renderAccount).join("");
    }

    try {
      await loadAccounts();
    } catch (error) {
      showToast("No se pudo cargar las cuentas.", { type: "error" });
      accountsList.innerHTML = "<p class='py-4 text-sm text-slate-500'>Error al cargar cuentas.</p>";
      console.error(error);
    }
  </script>
</body>
</html>
