<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Ingresando...</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <div id="authStatus" class="card p-4">Ingresando...</div>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { getSession, onAuthChange } from "/js/app/auth/auth.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";

    function sanitizeInternalPath(value, fallback = "/pages/home.html") {
      const raw = String(value || "").trim();
      if (!raw) return fallback;
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return fallback;
        return `${url.pathname}${url.search}${url.hash}`;
      } catch {
        return fallback;
      }
    }

    initAppShell({
      title: "Ingresando",
      onRefresh: async () => location.reload()
    });

    const next = new URLSearchParams(location.search).get("next");
    const fallbackTarget = "/pages/home.html";
    const target = sanitizeInternalPath(next ? decodeURIComponent(next) : fallbackTarget, fallbackTarget);

    let hasNavigated = false;
    let fallbackTimer = null;
    const navigateOnce = (url) => {
      if (hasNavigated) return;
      hasNavigated = true;
      if (fallbackTimer) clearTimeout(fallbackTimer);
      location.replace(url);
    };

    const statusEl = document.getElementById("authStatus");
    statusEl.textContent = "Validando sesion...";

    async function waitForSession(maxMs = 10000, stepMs = 400) {
      const deadline = Date.now() + maxMs;
      while (Date.now() < deadline) {
        const s = await getSession();
        if (s) return s;
        await new Promise((resolve) => setTimeout(resolve, stepMs));
      }
      return null;
    }

    let authSubscription = null;
    const authListener = onAuthChange((session) => {
      if (session) {
        authSubscription?.unsubscribe();
        navigateOnce(target);
      }
    });
    authSubscription = authListener?.data?.subscription ?? null;

    const currentSession = await getSession();
    if (currentSession) {
      authSubscription?.unsubscribe();
      navigateOnce(target);
    } else {
      fallbackTimer = setTimeout(async () => {
        const retrySession = await waitForSession(3000, 300);
        authSubscription?.unsubscribe();
        if (retrySession) {
          navigateOnce(target);
          return;
        }
        navigateOnce(`/pages/login.html?next=${encodeURIComponent(target)}`);
      }, 7000);
    }
  </script>
</body>
</html>
