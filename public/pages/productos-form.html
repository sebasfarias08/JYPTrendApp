<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Formulario producto</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>
<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <div id="productFormActions" class="hidden items-center justify-end gap-2">
        <button id="btnEditTop" type="button" class="btn btn-secondary text-sm">Editar</button>
        <button id="btnDeleteTop" type="button" class="btn btn-secondary text-sm">Borrar</button>
      </div>
      <h2 id="productFormTitle" class="text-sm font-semibold">Nuevo producto</h2>
      <form id="productForm" class="space-y-3">
        <div>
          <label class="text-xs text-muted block mb-1" for="productName">Nombre *</label>
          <input id="productName" class="input" required />
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="productPrice">Precio base del producto *</label>
          <input id="productPrice" type="number" min="0" step="1" class="input" required />
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="productCategory">Categoria</label>
          <select id="productCategory" class="input"></select>
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="productImagePath">Ruta imagen</label>
          <input id="productImagePath" class="input" placeholder="products/imagen.jpg" />
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="productDescription">Descripcion</label>
          <textarea id="productDescription" class="input" placeholder="Descripcion corta del producto"></textarea>
        </div>

        <div class="pt-2 border-t divider">
          <div class="flex items-center justify-between mb-2">
            <h3 class="text-sm font-semibold">Variantes</h3>
            <button id="btnAddVariant" type="button" class="btn btn-secondary text-sm">Agregar variante</button>
          </div>
          <div id="variantsList" class="space-y-2"></div>
          <p class="text-xs text-muted">Cada variante representa un SKU vendible.</p>
        </div>

        <div class="flex gap-2">
          <button id="btnSaveProduct" type="submit" class="btn btn-primary flex-1">Guardar</button>
          <button id="btnCancelProduct" type="button" class="btn btn-secondary">Cancelar</button>
        </div>
      </form>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireRole } from "/js/app/auth/auth.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";
    import { initProductFormPage } from "/js/features/product/product-form-page.js";

    const session = await requireRole(["admin"]);
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Producto",
      onRefresh: async () => location.reload()
    });

    initProductFormPage();
  </script>
</body>
</html>
