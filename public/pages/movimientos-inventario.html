<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Movimientos de inventario</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 space-y-3 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <div class="flex items-center gap-2">
        <input id="q" class="input" placeholder="Buscar por producto, variante, ubicacion o referencia" />
        <button id="btnNewInventoryMovement" class="btn btn-primary whitespace-nowrap">Nuevo</button>
      </div>

      <div>
        <label class="text-xs text-muted block mb-1" for="movementTypeFilter">Tipo</label>
        <select id="movementTypeFilter" class="input">
          <option value="">Todos</option>
          <option value="ADJUSTMENT">ADJUSTMENT</option>
          <option value="PURCHASE">PURCHASE</option>
          <option value="SALE">SALE</option>
          <option value="RETURN">RETURN</option>
          <option value="TRANSFER_IN">TRANSFER_IN</option>
          <option value="TRANSFER_OUT">TRANSFER_OUT</option>
        </select>
      </div>

      <div id="inventoryMovementsCount" class="text-sm text-muted">0 movimiento(s)</div>
    </section>

    <section class="space-y-3">
      <div id="inventoryMovementsEmpty" class="card p-4 text-sm text-muted">
        No hay movimientos de stock cargados todavia.
      </div>
      <div id="inventoryMovementsList" class="space-y-3"></div>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireRole } from "/js/app/auth/auth.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";
    import { initInventoryMovementsPage } from "/js/features/inventory/inventory-movements-page.js";

    const session = await requireRole(["admin"]);
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Movimientos",
      onRefresh: async () => location.reload()
    });

    initInventoryMovementsPage();
  </script>
</body>
</html>
