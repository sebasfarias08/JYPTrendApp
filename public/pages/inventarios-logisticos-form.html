<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Formulario inventario logistico</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>
<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <div id="logisticsFormActions" class="hidden items-center justify-end gap-2">
        <button id="btnEditTop" type="button" class="btn btn-secondary text-sm">Editar</button>
        <button id="btnDeleteTop" type="button" class="btn btn-secondary text-sm">Borrar</button>
      </div>
      <h2 id="logisticsFormTitle" class="text-sm font-semibold">Nuevo inventario logistico</h2>
      <form id="logisticsForm" class="space-y-3">
        <div>
          <label class="text-xs text-muted block mb-1" for="logisticsType">Tipo *</label>
          <select id="logisticsType" class="input" required></select>
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="logisticsName">Nombre *</label>
          <input id="logisticsName" class="input" required />
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="logisticsCode">Codigo</label>
          <input id="logisticsCode" class="input" placeholder="DEP-CENTRAL / LOCAL-01" />
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="logisticsDescription">Descripcion</label>
          <textarea id="logisticsDescription" class="input" placeholder="Detalle operativo del deposito o punto de venta"></textarea>
        </div>

        <div class="flex gap-2">
          <button id="btnSaveLogistics" type="submit" class="btn btn-primary flex-1">Guardar</button>
          <button id="btnCancelLogistics" type="button" class="btn btn-secondary">Cancelar</button>
        </div>
      </form>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireRole } from "/js/auth.js";
    import { initAppShell } from "/js/app-shell.js";
    import { initLogisticsInventoryFormPage } from "/js/logistics-inventory-form-page.js";

    const session = await requireRole(["admin"]);
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Inventario",
      onRefresh: async () => location.reload()
    });

    initLogisticsInventoryFormPage();
  </script>
</body>
</html>
