<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Productos</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 space-y-3 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <div class="flex items-center gap-2">
        <input id="q" class="input" placeholder="Buscar por producto, categoria, variante o SKU" />
        <button id="btnNewProduct" class="btn btn-primary whitespace-nowrap">Nuevo</button>
      </div>

      <label class="inline-flex items-center gap-2 text-sm text-muted">
        <input id="showInactive" type="checkbox" />
        Ver inactivos
      </label>

      <div id="productsCount" class="text-sm text-muted">0 producto(s)</div>
    </section>

    <section class="space-y-3 content-container">
      <div id="productsEmpty" class="empty-state hidden">
        <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
        </svg>
        <div class="empty-state-title">No hay productos aún</div>
        <div class="empty-state-description">
          Comienza creando tu primer producto para gestionar tu inventario y ventas.
        </div>
        <button id="btnNewProduct" class="btn btn-primary">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
          Crear primer producto
        </button>
      </div>
      <div id="productsList" class="space-y-3"></div>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireRole } from "/js/app/auth/auth.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";
    import { initProductsPage } from "/js/features/product/products-page.js";

    const session = await requireRole(["admin"]);
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Productos",
      onRefresh: async () => location.reload()
    });

    initProductsPage();
  </script>
</body>
</html>
