<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Home</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 space-y-4 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <h2 class="font-semibold">Atajos</h2>
      <div class="grid grid-cols-2 gap-2">
        <a class="btn btn-primary text-center" href="/index.html?tab=perfumes">Nueva Reserva</a>
        <a class="btn btn-secondary text-center" href="/pages/pedidos.html">Historial</a>
        <a class="btn btn-secondary text-center" href="/pages/clientes.html">Clientes</a>
        <a class="btn btn-secondary text-center" href="/pages/checkout.html">Carrito</a>
      </div>
    </section>

    <section class="card p-4 space-y-3">
      <div class="flex items-center justify-between gap-3">
        <h2 class="font-semibold">Home</h2>
        <span id="pendingDeliveries" class="text-sm text-muted">Pendientes: -</span>
      </div>
      <div id="recentOrders" class="space-y-2">
        <p class="text-sm text-muted">Cargando pedidos...</p>
      </div>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireAuth } from "/js/auth.js";
    import { initAppShell } from "/js/app-shell.js";
    import * as ordersService from "/js/orders-service.js";
    import * as orderStatusModule from "/js/order-status.js";
    import { orderStatusBadgeClass, paymentStatusBadgeClass } from "/js/status-ui.js";
    import { showToast } from "/js/toast.js";
    const normalizeStatus = orderStatusModule.normalizeStatus ?? ((status) => String(status ?? "").trim());
    const statusLabel = orderStatusModule.statusLabel ?? ((status) => String(status ?? ""));

    const getMyOpenOrders = ordersService.getMyOpenOrders;

    const session = await requireAuth();
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Home",
      onRefresh: async () => loadDashboard()
    });

    const pendingDeliveriesEl = document.getElementById("pendingDeliveries");
    const recentOrdersEl = document.getElementById("recentOrders");

    const fmtMoney = (n) => new Intl.NumberFormat("es-AR", { maximumFractionDigits: 0 }).format(Number(n ?? 0));
    const escapeHtml = (str) => String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function renderRecentOrders(rows) {
      if (!rows.length) {
        recentOrdersEl.innerHTML = `<p class="text-sm text-muted">No hay pedidos activos para mostrar.</p>`;
        return;
      }

      recentOrdersEl.innerHTML = rows.slice(0, 8).map((o) => {
        const os = normalizeStatus(o.order_status ?? "Reservado");
        const ps = normalizeStatus(o.payment_status ?? "Pendiente");
        const customer = (o.customer_name || "").trim() || "Sin cliente";
        const fecha = new Date(o.created_at).toLocaleString("es-AR", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });
        const safeCustomer = escapeHtml(customer);
        const safeDate = escapeHtml(fecha);

        return `
          <a href="/pages/pedido-detalle.html?id=${encodeURIComponent(o.id)}" class="block border divider rounded-xl p-3">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="font-medium truncate">${safeCustomer}</div>
                <div class="text-xs text-muted mt-1">${safeDate}</div>
                <div class="mt-2 flex flex-wrap gap-1">
                  <span class="px-2 py-1 rounded-lg text-xs ${orderStatusBadgeClass(os)}">${statusLabel(os)}</span>
                  <span class="px-2 py-1 rounded-lg text-xs ${paymentStatusBadgeClass(ps)}">${statusLabel(ps)}</span>
                </div>
              </div>
              <div class="font-semibold">$ ${fmtMoney(o.total)}</div>
            </div>
          </a>
        `;
      }).join("");
    }

    async function loadDashboard() {
      showToast("Actualizando home...", { type: "info", duration: 1000 });

      const orders = await getMyOpenOrders({ limit: 200 });
      pendingDeliveriesEl.textContent = `Pendientes: ${orders.length}`;
      renderRecentOrders(orders);
    }

    await loadDashboard();
  </script>
</body>
</html>
