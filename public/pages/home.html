<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Home</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 space-y-4 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <h2 class="font-semibold">Accesos Rapidos</h2>
      <div class="grid grid-cols-2 gap-2">
        <a class="btn btn-primary text-center" href="/index.html?tab=perfumes">Nueva Reserva</a>
        <a class="btn btn-primary text-center" href="/pages/pedidos.html">Historial</a>
        <a class="btn btn-primary text-center" href="/pages/clientes.html">Clientes</a>
        <a class="btn btn-primary text-center" href="/pages/checkout.html">Carrito</a>
      </div>
    </section>

    <section class="card p-4 space-y-3">
      <div class="flex items-center justify-between gap-3">
        <h2 class="font-semibold">Mis pedidos</h2>
        <span id="pendingDeliveries" class="text-sm text-muted">Pendientes: -</span>
      </div>
      <div id="recentOrders" class="space-y-2">
        <p class="text-sm text-muted">Cargando pedidos...</p>
      </div>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireAuth } from "/js/auth.js";
    import { initAppShell } from "/js/app-shell.js";
    import * as ordersService from "/js/orders-service.js";
    import * as orderStatusModule from "/js/order-status.js";
    import { orderStatusBadgeClass, paymentStatusBadgeClass } from "/js/status-ui.js";
    import { showToast } from "/js/toast.js";
    const normalizeStatus = orderStatusModule.normalizeStatus ?? ((status) => String(status ?? "").trim());
    const statusLabel = orderStatusModule.statusLabel ?? ((status) => String(status ?? ""));

    const getMyOpenOrders = ordersService.getMyOpenOrders;

    const session = await requireAuth();
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Home",
      onRefresh: async () => loadDashboard()
    });

    const pendingDeliveriesEl = document.getElementById("pendingDeliveries");
    const recentOrdersEl = document.getElementById("recentOrders");

    const fmtMoney = (n) => new Intl.NumberFormat("es-AR", { maximumFractionDigits: 0 }).format(Number(n ?? 0));
    const escapeHtml = (str) => String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function orderDateGroupLabel(date) {
      const now = new Date();
      const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startGiven = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const diffDays = Math.round((startToday - startGiven) / 86400000);

      if (diffDays === 0) return "Hoy";
      if (diffDays === 1) return "Ayer";
      return date.toLocaleDateString("es-AR", { day: "numeric", month: "short" });
    }

    function renderRecentOrders(rows) {
      if (!rows.length) {
        recentOrdersEl.innerHTML = `<p class="text-sm text-muted">No hay pedidos activos para mostrar.</p>`;
        return;
      }

      const groups = new Map();
      rows.slice(0, 8).forEach((order) => {
        const createdAt = new Date(order.created_at);
        const label = orderDateGroupLabel(createdAt);
        if (!groups.has(label)) groups.set(label, []);
        groups.get(label).push(order);
      });

      const sections = [];
      for (const [label, items] of groups.entries()) {
        const cards = items.map((o) => {
          const os = normalizeStatus(o.order_status ?? "Reservado");
          const ps = normalizeStatus(o.payment_status ?? "Pendiente");
          const customer = (o.customer_name || "").trim() || "Sin cliente";
          const createdAt = new Date(o.created_at);
          const timeText = createdAt.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
          const ref = o.order_number ? `#${o.order_number}` : "Pedido";

          return `
            <a href="/pages/pedido-detalle.html?id=${encodeURIComponent(o.id)}" class="block bg-white rounded-xl shadow-sm p-3">
              <div class="flex items-start gap-3">
                <div class="min-w-0 flex-1">
                  <div class="font-semibold text-sm text-slate-900 truncate">${escapeHtml(customer)}</div>
                  <div class="text-xs text-slate-500 mt-0.5">${escapeHtml(timeText)}</div>
                  <div class="mt-2 flex flex-wrap gap-1">
                    <span class="inline-flex px-2 py-1 rounded-full text-[11px] font-medium ${orderStatusBadgeClass(os)}">${escapeHtml(statusLabel(os))}</span>
                    <span class="inline-flex px-2 py-1 rounded-full text-[11px] font-medium ${paymentStatusBadgeClass(ps)}">${escapeHtml(statusLabel(ps))}</span>
                  </div>
                </div>

                <div class="text-right shrink-0">
                  <div class="font-semibold text-sm text-slate-900">$ ${fmtMoney(o.total)}</div>
                  <div class="text-xs text-slate-500 mt-2">${escapeHtml(ref)}</div>
                </div>
              </div>
            </a>
          `;
        }).join("");

        sections.push(`
          <section class="space-y-2">
            <h2 class="text-sm font-semibold text-slate-700">${escapeHtml(label)}</h2>
            <div class="space-y-2">${cards}</div>
          </section>
        `);
      }

      recentOrdersEl.innerHTML = sections.join("");
    }

    async function loadDashboard() {
      showToast("Actualizando home...", { type: "info", duration: 1000 });

      const orders = await getMyOpenOrders({ limit: 200 });
      pendingDeliveriesEl.textContent = `Pendientes: ${orders.length}`;
      renderRecentOrders(orders);
    }

    await loadDashboard();
  </script>
</body>
</html>
