<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <meta name="google-maps-api-key" content="" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Formulario cliente</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>
<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <h2 id="clientFormTitle" class="text-sm font-semibold">Nuevo cliente</h2>
      <form id="clientForm" class="space-y-3">
        <div>
          <label class="text-xs text-muted block mb-1" for="clientName">Nombre completo *</label>
          <input id="clientName" class="input" required />
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="clientPhone">Telefono</label>
          <div class="flex min-h-[44px] items-stretch overflow-hidden rounded-[var(--radius)] border border-[var(--border-strong)] bg-surface focus-within:border-[var(--primary)] focus-within:shadow-[0_0_0_3px_var(--ring)]">
            <span class="inline-flex shrink-0 items-center border-r divider bg-surface-2 px-3 text-sm font-semibold text-muted select-none">
              +54 9
            </span>
            <input
              id="clientPhone"
              type="tel"
              class="min-w-0 flex-1 border-0 bg-transparent px-3 py-[10px] text-[var(--text)] outline-none"
              placeholder="11 6054 0410"
              inputmode="numeric"
              autocomplete="tel-national"
              spellcheck="false"
              aria-describedby="clientPhoneHelp" />
          </div>
          <p id="clientPhoneHelp" class="mt-1 text-xs text-subtle">
            Ingresa el celular local. Ej: 11 6054 0410.
          </p>
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="clientEmail">Email</label>
          <input id="clientEmail" type="email" class="input" placeholder="cliente@correo.com" />
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="clientAddressSearch">Buscar direccion</label>
          <input
            id="clientAddressSearch"
            type="search"
            class="input"
            placeholder="Av. Corrientes 1234"
            autocomplete="street-address"
            spellcheck="false"
            enterkeyhint="search"
            aria-describedby="clientAddressStatus" />
          <p id="clientAddressStatus" class="mt-1 text-xs text-subtle">
            Busca y selecciona una direccion sugerida por Maps.
          </p>
          <div id="clientAddressSummary" class="hidden mt-2 rounded-[var(--radius)] border divider bg-surface-2 px-3 py-2 text-sm"></div>
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="clientAddressNotes">Detalle / Piso / Depto / Referencia</label>
          <textarea
            id="clientAddressNotes"
            class="input"
            rows="2"
            placeholder="Torre B, piso 3, depto C, porteria 24 hs"></textarea>
        </div>

        <div>
          <button id="btnOpenMaps" type="button" class="btn btn-secondary w-full opacity-60 cursor-not-allowed" disabled>
            Abrir en Maps
          </button>
        </div>

        <div>
          <label class="text-xs text-muted block mb-1" for="clientNotes">Notas</label>
          <textarea id="clientNotes" class="input" placeholder="Condiciones comerciales"></textarea>
        </div>

        <div id="clientFormActions" class="flex gap-2">
          <button id="btnSaveClient" type="submit" class="btn btn-primary flex-1">Guardar</button>
          <button id="btnCancelClient" type="button" class="btn btn-secondary">Cancelar</button>
        </div>

        <div id="clientDetailActions" class="hidden gap-2">
          <button id="btnEditClient" type="button" class="btn btn-secondary flex-1">Editar</button>
          <button id="btnToggleClientActive" type="button" class="btn btn-secondary flex-1">Dar de baja</button>
        </div>
      </form>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireAuth } from "/js/app/auth/auth.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";
    import { initClientFormPage } from "/js/features/customers/client-form-page.js";

    const session = await requireAuth();
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Cliente",
      onRefresh: async () => location.reload()
    });

    initClientFormPage(session);
  </script>
</body>
</html>
