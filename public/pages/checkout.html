<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Reserva</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 space-y-4 pb-40">
    <section class="card p-4 space-y-3">
      <div class="grid gap-2">
        <span class="text-xs text-muted">Cliente</span>
        <div id="customerSelect" class="relative">
          <button id="customerSelectTrigger" type="button" class="input text-left flex items-center justify-between">
            <span id="customerSelectLabel">Seleccionar cliente</span>
            <span class="text-muted text-sm">&gt;</span>
          </button>
        </div>
        <div id="customerRequiredWarning" class="hidden rounded-xl border border-red-200 bg-red-50 px-3 py-2 text-xs text-red-700 flex items-center gap-2">
          <span class="inline-flex h-5 w-5 items-center justify-center rounded-full border border-red-300 bg-white text-red-600 font-bold">!</span>
          <span>Selecciona un cliente para poder confirmar el pedido.</span>
        </div>
      </div>
    </section>

    <section class="card p-4 space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="text-sm font-semibold">Items del carrito</h2>
        <span id="itemCount" class="text-xs px-2 py-1 rounded-full chip">0 item(s)</span>
      </div>
      <div id="list" class="space-y-3"></div>
    </section>
  </main>

  <section id="customerSelectPanel" class="fixed inset-0 z-40 hidden bg-white">
    <div class="h-full flex flex-col">
      <div class="sticky top-0 z-10 bg-white border-b divider px-4 py-3 space-y-3">
        <div class="flex items-center gap-2">
          <button id="customerSelectClose" type="button" class="icon-btn !w-9 !h-9" aria-label="Cerrar selector de cliente">
            <span aria-hidden="true">&#8592;</span>
          </button>
          <h2 class="text-base font-semibold">Seleccionar cliente</h2>
        </div>
        <input id="customerSearch" class="input" placeholder="Buscar cliente..." />
      </div>
      <div class="flex-1 overflow-y-auto px-3 py-2">
        <div id="customerOptions" class="space-y-1"></div>
      </div>
    </div>
  </section>

  <div id="checkoutStickyBar" class="fixed bottom-14 left-0 right-0 z-20 border-t divider bg-surface backdrop-blur">
    <div class="mx-auto max-w-3xl p-3 flex items-center gap-3">
      <div class="flex-1">
        <div class="text-xs text-muted">Total a cobrar</div>
        <div id="totalSticky" class="text-lg font-semibold">$ 0</div>
      </div>
      <button id="btnSubmitSticky" class="btn btn-primary whitespace-nowrap">Confirmar pedido</button>
    </div>
  </div>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireRole } from "/js/app/auth/auth.js";
    import { initCheckoutPage } from "/js/features/checkout/checkout-page.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";

    const session = await requireRole(["admin", "seller"]);
    if (!session) throw new Error("Redirecting due role guard...");

    initAppShell({
      title: "Reserva",
      onRefresh: async () => location.reload()
    });

    initCheckoutPage(session);
  </script>
</body>
</html>
