<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Reserva</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main id="checkoutMain" class="flex-1 overflow-y-auto p-4 space-y-4 pb-[calc(env(safe-area-inset-bottom)+13rem)]">
    <section class="card p-4 space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="text-sm font-semibold">Items del carrito</h2>
        <span id="itemCount" class="text-xs px-2 py-1 rounded-full chip">0 item(s)</span>
      </div>
      <div id="list" class="space-y-3"></div>
    </section>

    <section class="card p-4 space-y-3">
      <h2 class="text-sm font-semibold">Cliente</h2>
      <div class="grid gap-2">
        <div id="customerSelect" class="relative">
          <button id="customerSelectTrigger" type="button" class="input text-left flex items-center justify-between shadow-sm" aria-label="Seleccionar cliente">
            <span id="customerSelectLabel">Seleccionar cliente</span>
            <span class="text-muted">&#9662;</span>
          </button>
        </div>
        <div id="customerRequiredWarning" class="hidden rounded-xl border border-red-200 bg-red-50 px-3 py-2 text-xs text-red-700 flex items-center gap-2">
          <span class="inline-flex h-5 w-5 items-center justify-center rounded-full border border-red-300 bg-white text-red-600 font-bold">!</span>
          <span>Selecciona un cliente para poder confirmar el pedido.</span>
        </div>
      </div>
    </section>
  </main>

  <div id="customerSheetBackdrop" class="fixed inset-0 z-40 hidden bg-slate-900/35"></div>
  <section id="customerSelectPanel" class="fixed inset-x-0 bottom-0 z-50 hidden max-h-[78vh] translate-y-full rounded-t-3xl bg-white shadow-xl transition duration-200 ease-out">
    <div class="px-4 py-3 border-b divider">
      <div class="mx-auto mb-2 h-1.5 w-12 rounded-full bg-slate-300"></div>
      <div class="flex items-center justify-between gap-3">
        <h3 class="text-sm font-semibold">Seleccionar cliente</h3>
        <button id="customerSheetClose" type="button" class="icon-btn !w-9 !h-9" aria-label="Cerrar seleccion de cliente">✕</button>
      </div>
      <input id="customerSearch" class="input mt-2" placeholder="Buscar cliente..." />
    </div>
    <div class="px-3 py-2 overflow-y-auto max-h-[calc(78vh-7.5rem)]">
      <div id="customerOptions" class="space-y-1"></div>
    </div>
  </section>

  <div id="checkoutStickyBar" class="fixed left-0 right-0 z-30 border-t divider bg-surface backdrop-blur bottom-[calc(env(safe-area-inset-bottom)+4.5rem)]">
    <div class="mx-auto max-w-3xl p-3 flex items-center gap-3">
      <div class="flex-1">
        <div class="text-xs text-muted">Total a cobrar</div>
        <div id="totalSticky" class="text-lg font-semibold">$ 0</div>
      </div>
      <button id="btnSubmitSticky" class="btn btn-primary whitespace-nowrap">Confirmar reserva</button>
    </div>
  </div>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireAuth } from "/js/auth.js";
    import { initCheckoutPage } from "/js/checkout-page.js";
    import { initAppShell } from "/js/app-shell.js";

    const session = await requireAuth();
    if (!session) throw new Error("Redirecting to login...");

    initAppShell({
      title: "Reserva",
      onRefresh: async () => location.reload()
    });

    initCheckoutPage(session);
  </script>
</body>
</html>
