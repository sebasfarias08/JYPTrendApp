<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Login</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto flex items-center justify-center p-4 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <div class="w-full max-w-sm card p-5 space-y-4">
      <h1 class="text-xl font-semibold">Ingresar</h1>
      <p class="text-muted text-sm">Inicia sesion con tu cuenta de Google para usar la app de ventas.</p>

      <button id="btnGoogle" class="btn btn-primary w-full">Continuar con Google</button>
    </div>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { getSession, signInWithGoogle } from "/js/app/auth/auth.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";

    function sanitizeInternalPath(value, fallback = "/pages/home.html") {
      const raw = String(value || "").trim();
      if (!raw) return fallback;
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return fallback;
        return `${url.pathname}${url.search}${url.hash}`;
      } catch {
        return fallback;
      }
    }

    initAppShell({
      title: "Login",
      onRefresh: async () => location.reload()
    });

    const params = new URLSearchParams(location.search);
    const next = params.get("next");
    if (next) {
      const sanitized = sanitizeInternalPath(decodeURIComponent(next), "");
      if (sanitized) localStorage.setItem("auth_next", sanitized);
    }

    const btnGoogle = document.getElementById("btnGoogle");
    btnGoogle.addEventListener("click", async () => {
      btnGoogle.disabled = true;
      btnGoogle.classList.add("opacity-70", "cursor-not-allowed");
      try {
        await signInWithGoogle();
      } catch {
        btnGoogle.disabled = false;
        btnGoogle.classList.remove("opacity-70", "cursor-not-allowed");
      }
    });

    const existingSession = await getSession();
    if (existingSession) {
      const target = sanitizeInternalPath(
        next ? decodeURIComponent(next) : "/pages/home.html",
        "/pages/home.html"
      );
      location.replace(target);
    }
  </script>
</body>
</html>
