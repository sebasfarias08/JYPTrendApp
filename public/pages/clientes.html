<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Clientes</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main class="flex-1 overflow-y-auto p-4 space-y-3 pb-[calc(env(safe-area-inset-bottom)+7rem)]">
    <section class="card p-4 space-y-3">
      <div class="flex items-center gap-2">
        <input id="q" class="input" placeholder="Buscar cliente por nombre, telefono o email" />
        <button id="btnNewClient" class="btn btn-primary whitespace-nowrap">Nuevo</button>
      </div>

      <label class="inline-flex items-center gap-2 text-sm text-muted">
        <input id="showInactive" type="checkbox" />
        Ver inactivos
      </label>

      <div id="clientsCount" class="text-sm text-muted">0 cliente(s)</div>
    </section>

    <section class="space-y-3 content-container">
      <div id="clientsEmpty" class="empty-state hidden">
        <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
        </svg>
        <div class="empty-state-title">No hay clientes aún</div>
        <div class="empty-state-description">
          Comienza agregando tus primeros clientes para gestionar pedidos y ventas.
        </div>
        <button id="btnNewClient" class="btn btn-primary">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
          Agregar primer cliente
        </button>
      </div>
      <div id="clientsList" class="space-y-3"></div>
    </section>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireAuth } from "/js/app/auth/auth.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";
    import { initClientsPage } from "/js/features/customers/clients-page.js";

    const session = await requireAuth();
    if (!session) throw new Error("Redirect login");

    initAppShell({
      title: "Clientes",
      onRefresh: async () => location.reload()
    });

    initClientsPage(session);
  </script>
</body>
</html>
