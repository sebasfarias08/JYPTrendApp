<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F8FA" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JyP Ventas">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>JyP Ventas</title>
  <script src="/js/vendor/tailwindcss-playcdn.js"></script>
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

<body class="h-screen overflow-hidden flex flex-col">
  <header id="appShellTop"></header>

  <main id="mainScroll" class="flex-1 overflow-y-auto pb-20">
    <div id="list" class="divide-y divider"></div>
    <div id="emptyState" class="hidden p-4 text-sm text-muted">No hay variantes para mostrar.</div>
    <div id="statusLine" class="p-3 text-xs text-subtle"></div>
  </main>

  <nav id="appShellBottom"></nav>

  <script type="module">
    import { requireAuth } from "/js/app/auth/auth.js";
    import { registerServiceWorker, applyUpdate } from "/js/app/core/sw-register.js";
    import { getProducts } from "/js/features/catalog/catalog-service.js";
    import { getCatalogCardImageUrls } from "/js/shared/utils/image.js";
    import { addToCart } from "/js/features/checkout/cart.js";
    import { initAppShell } from "/js/app/shell/app-shell.js";
    import { INVENTORY_CHANGED_EVENT } from "/js/features/inventory/stock-service.js";
    import { normalizeRole, ROLES } from "/js/app/auth/permissions.js";

    let searchInputEl = null;
    const listEl = document.getElementById("list");
    const emptyStateEl = document.getElementById("emptyState");
    const statusLineEl = document.getElementById("statusLine");
    const CATALOG_SCROLL_KEY = "catalog_scroll_position";
    const mainScrollEl = document.getElementById("mainScroll");
    const FIRST_VISIBLE_IMAGE_COUNT = 4;

    function saveCatalogScrollPosition() {
      if (!mainScrollEl) return;
      sessionStorage.setItem(CATALOG_SCROLL_KEY, String(mainScrollEl.scrollTop));
    }

    function restoreCatalogScrollPosition() {
      if (!mainScrollEl) return;

      const storedValue = sessionStorage.getItem(CATALOG_SCROLL_KEY);
      const scrollTop = Number(storedValue);
      if (!Number.isFinite(scrollTop) || scrollTop < 0) return;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          mainScrollEl.scrollTop = scrollTop;
          sessionStorage.removeItem(CATALOG_SCROLL_KEY);
        });
      });
    }

    const TABS = {
      "botellas": "Botellas",
      "perfumes": "Perfumes",
      "importados": "Importados",
      "outlet": "Outlet",
      "home": "Home"
    };

    let products = [];
    let selectedTab = "perfumes";
    let pendingReg = null;
    const tabFromUrl = new URLSearchParams(location.search).get("tab");
    if (!tabFromUrl) {
      location.replace("/index.html?tab=perfumes");
      await new Promise(() => {});
    }
    if (tabFromUrl && TABS[tabFromUrl]) {
      selectedTab = tabFromUrl;
    }

    function fmtMoney(value) {
      const n = Number(value ?? 0);
      return new Intl.NumberFormat("es-AR", { maximumFractionDigits: 0 }).format(n);
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeSlug(value) {
      return String(value ?? "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/\p{Diacritic}/gu, "")
        .replace(/\s+/g, "-");
    }

    function currentTabLabel() {
      return TABS[selectedTab] ?? "Productos";
    }

    function updateTabUi() {
      document.querySelectorAll("[data-shell-tab]").forEach((btn) => {
        const active = btn.getAttribute("data-shell-tab") === selectedTab;
        btn.classList.toggle("text-blue-600", active);
        btn.classList.toggle("font-semibold", active);
        if (btn.getAttribute("data-shell-tab") === "outlet") {
          btn.classList.toggle("text-rose-600", !active);
          btn.classList.remove("text-slate-500");
        } else {
          btn.classList.toggle("text-slate-500", !active);
          btn.classList.remove("text-rose-600");
        }
        btn.setAttribute("aria-current", active ? "page" : "false");
      });
    }

    function renderList(rows) {
      if (!rows.length) {
        listEl.innerHTML = "";
        emptyStateEl.classList.remove("hidden");
        statusLineEl.textContent = "Sin resultados para esta categoria/filtro.";
        return;
      }

      emptyStateEl.classList.add("hidden");
      listEl.innerHTML = rows.map((p, index) => {
        const imageUrls = p.image_path
          ? getCatalogCardImageUrls(String(p.image_path).trim().replace(/^\/+/, ""))
          : { transformedUrl: "", publicUrl: "" };
        const stock = Number(p.stock_qty ?? 0);
        const hasStock = stock > 0;
        const productHref = `/pages/producto.html?id=${encodeURIComponent(p.product_id || "")}&variant_id=${encodeURIComponent(p.variant_id || p.id || "")}`;
        const loading = index < FIRST_VISIBLE_IMAGE_COUNT ? "eager" : "lazy";
        const fetchPriority = index === 0 ? "high" : loading === "lazy" ? "low" : "auto";

        return `
          <article class="px-3 py-2">
            <div class="flex items-center gap-3 card p-2.5">
              <a href="${productHref}" class="block shrink-0">
                <img
                  src="${imageUrls.transformedUrl}"
                  data-fallback-src="${imageUrls.publicUrl}"
                  alt="${escapeHtml(p.name)}"
                  width="70"
                  height="70"
                  loading="${loading}"
                  decoding="async"
                  fetchpriority="${fetchPriority}"
                  class="w-[70px] h-[70px] rounded-lg border divider bg-surface-2 object-contain"
                />
              </a>

              <a href="${productHref}" class="min-w-0 flex-1">
                <h2 class="font-semibold text-sm leading-5 line-clamp-2">${escapeHtml(p.name)}</h2>
                <p class="text-xs text-muted mt-1">$ ${fmtMoney(p.price)}</p>
                <p class="text-xs mt-1 ${hasStock ? "text-emerald-700" : "text-rose-700"}">
                  Stock: ${fmtMoney(stock)}
                </p>
              </a>

              <div class="w-14 flex flex-col items-end gap-2">
                <button
                  type="button"
                  data-add-product-id="${escapeHtml(p.product_id ?? "")}"
                  data-add-variant-id="${escapeHtml(p.variant_id ?? "")}"
                  data-add-name="${escapeHtml(p.name)}"
                  data-add-price="${Number(p.price ?? 0)}"
                  data-add-image="${escapeHtml(p.image_path ?? "")}"
                  data-add-warehouse-id="${escapeHtml(p.warehouse_id ?? "")}"
                  data-add-point-of-sale-id="${escapeHtml(p.point_of_sale_id ?? "")}"
                  class="btn btn-primary w-11 h-11 rounded-full p-0 ${hasStock ? "" : "opacity-50 cursor-not-allowed"}"
                  ${hasStock ? "" : "disabled"}
                  aria-label="Agregar al carrito">
                  <span class="flex items-center justify-center text-white">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 stroke-[1.8]" fill="none" stroke="currentColor" aria-hidden="true">
                      <path d="M12 5v14"></path>
                      <path d="M5 12h14"></path>
                    </svg>
                  </span>
                </button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      listEl.querySelectorAll("img[data-fallback-src]").forEach((img) => {
        img.addEventListener("error", () => {
          const fallbackSrc = img.getAttribute("data-fallback-src") || "";
          if (!fallbackSrc || img.getAttribute("src") === fallbackSrc) return;
          img.setAttribute("src", fallbackSrc);
        }, { once: true });
      });

      listEl.querySelectorAll('a[href^="/pages/producto.html"]').forEach((link) => {
        link.addEventListener("click", () => {
          saveCatalogScrollPosition();
        });
      });

      listEl.querySelectorAll("[data-add-variant-id]").forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();

          addToCart({
            product_id: btn.getAttribute("data-add-product-id"),
            variant_id: btn.getAttribute("data-add-variant-id"),
            name: btn.getAttribute("data-add-name"),
            price: Number(btn.getAttribute("data-add-price") || 0),
            image_path: btn.getAttribute("data-add-image") || "",
            warehouse_id: btn.getAttribute("data-add-warehouse-id") || null,
            point_of_sale_id: btn.getAttribute("data-add-point-of-sale-id") || null
          }, 1);

          applyFilters();
          statusLineEl.textContent = "Variante agregada al carrito.";
        });
      });
    }

    function applyFilters() {
      const q = (searchInputEl?.value || "").toLowerCase().trim();
      const rows = products.filter((p) => {
        const name = String(p.name ?? "").toLowerCase();
        const slug = normalizeSlug(p.categories?.slug ?? p.categories?.name ?? "");

        const matchTab = !selectedTab || slug === selectedTab;
        const matchSearch = !q || name.includes(q);
        return matchTab && matchSearch;
      });

      renderList(rows);
      statusLineEl.textContent = `${rows.length} variante(s) en ${currentTabLabel()}.`;
    }

    async function reloadProducts() {
      statusLineEl.textContent = "Actualizando catalogo...";
      try {
        products = await getProducts({
          userId: session.user.id,
          profile: session.profile
        });
      } catch (error) {
        console.error("reloadProducts error:", error);
        products = [];
        listEl.innerHTML = "";
        emptyStateEl.classList.remove("hidden");
        emptyStateEl.textContent = String(
          error?.message ||
          "No se pudo cargar el catalogo porque falta un contexto de venta valido."
        );
        statusLineEl.textContent = "Catalogo no disponible.";
        return;
      }

      const hasPerfumes = products.some((p) => normalizeSlug(p.categories?.slug ?? p.categories?.name ?? "") === "perfumes");
      if (!hasPerfumes) {
        const firstWithCategory = products.find((p) => normalizeSlug(p.categories?.slug ?? p.categories?.name ?? ""));
        selectedTab = normalizeSlug(firstWithCategory?.categories?.slug ?? firstWithCategory?.categories?.name ?? "");
      }

      updateTabUi();
      applyFilters();
    }

    const session = await requireAuth();
    if (!session) throw new Error("Redirecting to login...");

    initAppShell({
      title: "Perfumes",
      onRefresh: reloadProducts
    });

    searchInputEl = document.getElementById("appShellSearchInput");

    registerServiceWorker({
      onUpdate: (reg) => {
        pendingReg = reg;
        document.getElementById("updateBanner")?.classList.remove("hidden");
      }
    });

    document.getElementById("btnUpdate")?.addEventListener("click", () => applyUpdate(pendingReg), { once: true });

    document.querySelectorAll("[data-shell-tab]").forEach((btn) => {
      btn.addEventListener("click", (event) => {
        event.preventDefault();
        const value = btn.getAttribute("data-shell-tab") || "";
        if (value === "home") {
          const role = normalizeRole(document.body.dataset.role || ROLES.VIEWER);
          location.href = role === ROLES.VIEWER ? "/index.html?tab=perfumes" : "/pages/home.html";
          return;
        }
        selectedTab = value;
        history.replaceState({}, "", `/index.html?tab=${encodeURIComponent(value)}`);
        updateTabUi();
        applyFilters();
      });
    });

    searchInputEl?.addEventListener("input", applyFilters);
    window.addEventListener("cart:changed", applyFilters);
    window.addEventListener(INVENTORY_CHANGED_EVENT, () => {
      reloadProducts();
    });
    window.addEventListener("pagehide", () => {
      saveCatalogScrollPosition();
    });

    await reloadProducts();
    restoreCatalogScrollPosition();
  </script>
</body>
</html>
